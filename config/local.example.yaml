# Copy this file to local.yaml for your local overrides.
# Do NOT commit local.yaml to version control.
# Environment secrets like Telegram tokens should be passed via env vars,
# not hardcoded here.

telegram:
  enabled: false
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"

risk:
  max_position_pct: 0.05
  max_total_exposure_pct: 0.50

universe:
  max_symbols_per_scan: 100
  allow_inactive_symbols: true

data_quality:
  enabled: true
  allow_zero_volume: true
  allow_warnings: true
  repair_enabled: true
  drop_invalid_price_bars: true
  drop_duplicate_bars: true
  fill_missing_volume_with_zero: true
  max_allowed_warning_ratio: 0.20
  block_on_errors: true

cache_refresh:
  enabled: true
  default_ttl_seconds: 86400
  force_refresh_default: false
  validate_cache_before_use: true
  repair_cache_before_use: true
  max_cache_age_days_daily: 3
  max_cache_age_days_intraday: 1
